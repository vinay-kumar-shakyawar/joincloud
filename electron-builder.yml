appId: app.joincloud.desktop
productName: JoinCloud
npmRebuild: true
asar: true
asarUnpack:
  - "**/*.node"
  - "**/node_modules/sqlite3/**"
  - "server/ui/**"
  - "server/bin/**"

files:
  - "**/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!**/._*"
  # Exclude sqlite3 native binaries so telemetry uses JSON fallback (no SIGSEGV).
  - "!**/node_modules/sqlite3/build/**"
  - "!**/node_modules/sqlite3/deps/**"
  - "!**/node_modules/sqlite3/bin/**"

directories:
  buildResources: build
  output: dist

extraResources:
  - from: server/bin/tunnel/
    to: bin/tunnel/
    filter:
      - "**/*"

mac:
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlementsInherit: build/entitlements.mac.plist
  entitlements: build/entitlements.mac.plist

win:
  target: nsis

linux:
  target: AppImage
